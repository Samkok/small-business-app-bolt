name: Deploy iOS to TestFlight

on:
  workflow_dispatch:  # manual trigger only

jobs:
  build-and-submit-ios:
    name: Build and Submit iOS
    runs-on: ubuntu-latest

    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}  # ✅ Authenticates EAS in all steps

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Install EAS CLI
        run: npm install -g eas-cli

      - name: 📂 Install dependencies
        run: npm install

      - name: 🛠️ Build iOS app for TestFlight
        run: eas build --platform ios --profile production --non-interactive

      - name: 🚀 Submit to TestFlight
        run: eas submit --platform ios --profile production --non-interactive
        env:
          EAS_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EAS_APPLE_APP_SPECIFIC_PASSWORD }}
